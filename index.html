<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FE Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-5">
        <div class="row">

            <!-- REGISTER -->
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        Register
                    </div>
                    <div class="card-body">
                        <div id="registerMsg" class="mt-2"></div>

                        <form method="post" id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" id="name" placeholder="Masukkan Nama" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Masukkan Email"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="password"
                                    placeholder="Masukkan Password" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Konfirmasi Password</label>
                                <input type="password" class="form-control" id="password_confirmation"
                                    placeholder="Masukkan Konfirmasi Password" required>
                            </div>

                            <button class="btn btn-primary w-100">Register</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- LOGIN -->
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        Login
                    </div>
                    <div class="card-body">
                        <div id="loginMsg" class="mt-2"></div>

                        <form method="post" id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="login_email" placeholder="Masukkan Email"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="login_password"
                                    placeholder="Masukkan Password" required>
                            </div>

                            <button class="btn btn-primary w-100">Login</button>
                        </form>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        // REGISTER
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = document.getElementById('registerForm');
            const msg = document.getElementById('registerMsg');
            msg.innerHTML = "";

            try {
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const password_confirmation = document.getElementById('password_confirmation').value;

                const res = await fetch(`http://localhost:8000/api/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        password_confirmation
                    })
                });

                const data = await res.json();

                if (res.status === 201) {
                    msg.innerHTML = `<div class='alert alert-success'>${data.message}</div>`;
                    form.reset();

                    setTimeout(() => {
                        msg.innerHTML = "";
                    }, 3000);

                } else if (res.status === 422) {
                    let errors = "";
                    for (const key in data.errors) {
                        errors += `<li>${data.errors[key][0]}</li>`;
                    }

                    msg.innerHTML = `<div class="alert alert-danger">
                        <ul>${errors}</ul>
                    </div>`;

                } else {
                    msg.innerHTML = `<div class='alert alert-danger'>
                        ${data.message || 'Terjadi kesalahan'}
                    </div>`;
                }

            } catch (error) {
                msg.innerHTML = `<div class='alert alert-danger'>Server Error</div>`;
            }
        });

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('loginMsg');
            msg.innerHTML = "";
            try {
                const email = document.getElementById('login_email').value;
                const password = document.getElementById('login_password').value;
                const res = await fetch(`http://localhost:8000/api/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                })

                const data = await res.json();

                if (res.status === 200) {
                    msg.innerHTML = `<div class='alert alert-success'>${data.message}</div>`
                    localStorage.setItem('token', data.token)
                    setTimeout(() => {
                        window.location.href = "user.html";
                    }, 3000)

                } else if (res.status === 401) {
                    msg.innerHTML = `<div class='alert alert-danger'>${data.message}</div>`
                    setTimeout(() => {
                        msg.innerHTML = "";
                    }, 4000)
                } else if (res.status === 422) {
                    let errors = "";
                    for (const key in data.errors) {
                        errors += `<li>${data.errors[key][0]}</li>`
                    }   
                    msg.innerHTML = `<div class="alert alert-danger">
                        <ul>${errors}</ul>
                    </div>`;
                } else {

                }

            } catch (error) {

            }
        });
    </script>
</body>

</html>
